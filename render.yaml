databases:
  - name: safeguard-db
    plan: free

services:
  - type: web
    name: safeguard-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safeguard-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.13.2

  - type: static
    name: safeguard-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        fromService:
          name: safeguard-backend
          type: web
          property: host
      - key: REACT_APP_ANDROID_API_BASE_URL
        fromService:
          name: safeguard-backend
          type: web
          property: host
      - key: REACT_APP_ANDROID_API_BASE_URLS
        fromService:
          name: safeguard-backend
          type: web
          property: host
      - key: REACT_APP_WS_BASE_URL
        fromService:
          name: safeguard-backend
          type: web
          property: host