services:
  - type: web
    name: safeguard-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "true"
          type: web
          property: host
      - key: REACT_APP_WS_BASE_URL
        fromService:
          name: safeguard-backend
          type: web
          property: host